name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          $env:PLAYWRIGHT_DOWNLOAD_HOST = "https://npmmirror.com/mirrors/playwright"
          $env:PLAYWRIGHT_BROWSERS_PATH = "0"
          python -m playwright install chromium

      - name: Prepare playwright browser folder for PyInstaller
        shell: pwsh
        run: |
          $pkgPath = python -c "import os,playwright; print(os.path.dirname(playwright.__file__))"
          New-Item -ItemType Directory -Force -Path "playwright/driver/package" | Out-Null
          Copy-Item -Recurse -Force "$pkgPath/driver/package/.local-browsers" "playwright/driver/package/.local-browsers"

      - name: Build with PyInstaller (onedir)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name wechatcoze `
            --add-data "static_src;static_src" `
            --add-data "playwright;playwright" `
            --add-data "hui.ico;." `
            main.py

      - name: Archive artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/wechatcoze/*" -DestinationPath "dist/wechatcoze-win.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechatcoze-win
          path: dist/wechatcoze-win.zip
